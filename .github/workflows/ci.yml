name: CI

'on':
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile app.py config.py fetcher.py models.py notifier.py storage.py watcher.py

      - name: CLI help smoke test
        run: |
          python app.py --help
          python app.py init
          python app.py list
          python app.py events --limit 1
